<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#D4A853;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#D4A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#D4A853;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#D4A853;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Spotlight background -->
  <ellipse cx="256" cy="380" rx="200" ry="80" fill="url(#spotlight)" />

  <!-- Trophy Base -->
  <rect x="196" y="420" width="120" height="30" rx="4" fill="url(#goldDark)" />
  <rect x="206" y="400" width="100" height="25" rx="3" fill="url(#goldBody)" />
  <rect x="216" y="380" width="80" height="25" rx="2" fill="url(#goldDark)" />

  <!-- Trophy Stem -->
  <rect x="236" y="320" width="40" height="65" fill="url(#goldBody)" />

  <!-- Trophy Cup Body -->
  <path d="M 176 140 Q 176 280 216 320 L 296 320 Q 336 280 336 140 Z" fill="url(#goldBody)" filter="url(#glow)" />

  <!-- Cup Rim -->
  <ellipse cx="256" cy="140" rx="82" ry="18" fill="url(#goldDark)" />
  <ellipse cx="256" cy="138" rx="78" ry="15" fill="#1a1a1a" />

  <!-- Left Handle -->
  <path d="M 176 160 Q 130 180 130 230 Q 130 280 176 280" fill="none" stroke="url(#goldBody)" stroke-width="14" stroke-linecap="round" />
  <path d="M 176 160 Q 130 180 130 230 Q 130 280 176 280" fill="none" stroke="url(#goldDark)" stroke-width="6" stroke-linecap="round" />

  <!-- Right Handle -->
  <path d="M 336 160 Q 382 180 382 230 Q 382 280 336 280" fill="none" stroke="url(#goldBody)" stroke-width="14" stroke-linecap="round" />
  <path d="M 336 160 Q 382 180 382 230 Q 382 280 336 280" fill="none" stroke="url(#goldDark)" stroke-width="6" stroke-linecap="round" />

  <!-- Decorative hexagon on cup -->
  <polygon points="256,200 276,215 276,240 256,255 236,240 236,215" fill="none" stroke="#B8860B" stroke-width="2" opacity="0.6" />

  <!-- Shine highlights -->
  <ellipse cx="220" cy="200" rx="15" ry="40" fill="white" opacity="0.15" transform="rotate(-10 220 200)" />
  <ellipse cx="290" cy="220" rx="8" ry="25" fill="white" opacity="0.1" transform="rotate(5 290 220)" />
</svg>