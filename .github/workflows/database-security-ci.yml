name: Database Security and Hardening Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'tests/security/**'
      - '.github/workflows/database-security-ci.yml'
      - 'src/lib/utils/redirect.ts'

jobs:
  verify:
    name: Database Security Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Start Docker Daemon
        run: |
          sudo systemctl start docker
          docker info

      - name: Start Local Supabase Stack
        run: |
          npx supabase@2.109.1 start --exclude storage,realtime,edge-functions,studio,analytics

      - name: List Local Migrations
        run: |
          npx supabase@2.109.1 migration list --local

      - name: Reset Local Database and Apply Migrations
        run: |
          npx supabase@2.109.1 db reset --local

      - name: Debug pg_proc custom functions configuration
        run: |
          npx supabase@2.109.1 db query "SELECT proname, proconfig FROM pg_proc WHERE proname IN ('create_payout_request_atomic', 'purchase_tier_with_wallet_atomic', 'is_admin');"

      - name: Run pgTAP Database Tests
        run: |
          npx supabase@2.109.1 test db --local > pgtap_output.txt 2>&1

      - name: Commit and Push pgTAP Test Logs on Failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b test-results
          git add pgtap_output.txt
          git commit -m "test: record pgTAP test results on failure"
          git push -f origin test-results

      - name: Run TypeScript Runtime Security Tests
        run: |
          npm run test:security

      - name: TypeScript Compilation Check
        run: |
          npx tsc --noEmit

      - name: Code Linting
        run: |
          npm run lint

      - name: Production Build Check
        run: |
          npm run build

      - name: Stop Local Supabase Stack
        if: always()
        run: |
          npx supabase@2.109.1 stop
