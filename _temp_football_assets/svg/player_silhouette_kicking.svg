<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="playerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050505;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A853;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#D4A853;stop-opacity:0" />
    </linearGradient>
    <filter id="playerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#D4A853" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Player body - geometric silhouette -->
  <g filter="url(#playerGlow)">
    <!-- Head -->
    <circle cx="200" cy="80" r="35" fill="url(#playerGrad)" />
    <!-- Neck -->
    <rect x="185" y="110" width="30" height="25" fill="url(#playerGrad)" />
    <!-- Torso -->
    <polygon points="160,135 240,135 230,240 170,240" fill="url(#playerGrad)" />
    <!-- Left arm (back, balancing) -->
    <polygon points="160,140 100,180 90,170 155,135" fill="url(#playerGrad)" />
    <!-- Right arm (forward, swinging) -->
    <polygon points="240,140 300,120 310,130 235,150" fill="url(#playerGrad)" />
    <!-- Right leg (kicking, extended) -->
    <polygon points="220,230 320,200 340,210 230,250" fill="url(#playerGrad)" />
    <!-- Right foot -->
    <polygon points="320,200 360,195 365,205 340,210" fill="url(#playerGrad)" />
    <!-- Left leg (plant, grounded) -->
    <polygon points="180,230 140,350 160,355 200,240" fill="url(#playerGrad)" />
    <!-- Left foot -->
    <polygon points="140,350 120,360 125,370 165,355" fill="url(#playerGrad)" />
  </g>

  <!-- Gold rim light on right edge -->
  <path d="M 200 45 Q 235 45 235 80 Q 235 115 240 135 L 310 120 L 340 210 L 360 195 L 365 205 L 230 250 L 200 240 L 160 355 L 125 370 L 120 360 L 140 350 L 170 240 L 160 135 L 100 180 L 90 170 L 155 135 L 165 115 Q 165 80 165 80 Q 165 45 200 45" 
        fill="none" stroke="url(#rimLight)" stroke-width="3" opacity="0.6" />

  <!-- Soccer ball near foot -->
  <circle cx="370" cy="200" r="18" fill="#0a0a0a" stroke="#D4A853" stroke-width="1.5" />
  <polygon points="370,188 378,194 378,206 370,212 362,206 362,194" fill="none" stroke="#D4A853" stroke-width="1" opacity="0.7" />
</svg>