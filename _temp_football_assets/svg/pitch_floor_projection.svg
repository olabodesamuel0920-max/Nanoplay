<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" width="1920" height="400" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="pitchGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2e1a;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#1a2e1a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="80%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Pitch floor base -->
  <rect x="0" y="0" width="1920" height="400" fill="url(#pitchGrad)" />

  <!-- Perspective pitch lines -->
  <line x1="960" y1="400" x2="200" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="400" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="600" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="800" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="960" y2="0" stroke="url(#lineGrad)" stroke-width="3" />
  <line x1="960" y1="400" x2="1120" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="1320" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="1520" y2="0" stroke="url(#lineGrad)" stroke-width="2" />
  <line x1="960" y1="400" x2="1720" y2="0" stroke="url(#lineGrad)" stroke-width="2" />

  <!-- Horizontal pitch lines (fading with perspective) -->
  <line x1="0" y1="350" x2="1920" y2="350" stroke="#ffffff" stroke-width="1" opacity="0.06" />
  <line x1="0" y1="300" x2="1920" y2="300" stroke="#ffffff" stroke-width="1" opacity="0.08" />
  <line x1="0" y1="250" x2="1920" y2="250" stroke="#ffffff" stroke-width="1" opacity="0.1" />
  <line x1="0" y1="200" x2="1920" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.06" />

  <!-- Center circle hint -->
  <ellipse cx="960" cy="380" rx="300" ry="15" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.08" />
</svg>