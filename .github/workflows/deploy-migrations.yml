# .github/workflows/deploy-migrations.yml
name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20.x'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: '2.108.0'

      - name: Link Supabase Project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"

      - name: Repair Baseline Status
        run: |
          supabase migration repair --status reverted 00000000000000 || echo "Baseline already reverted"

      - name: Dry-Run Migrations
        run: |
          if ! supabase db push --dry-run > dry_run.log 2>&1; then
            cat dry_run.log
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add dry_run.log
            git commit -m "chore: dump dry-run logs [skip ci]" || true
            git push origin main || true
            exit 1
          fi

      - name: Push Migrations to Production
        run: |
          if ! supabase db push > push_run.log 2>&1; then
            cat push_run.log
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add push_run.log
            git commit -m "chore: dump push logs [skip ci]" || true
            git push origin main || true
            exit 1
          fi

      - name: Install Verification Dependencies
        run: |
          npm install @supabase/supabase-js

      - name: Run Schema Verification
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tmp/inspect_all.js

      - name: Run Production Functional QA
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tmp/qa_functional_test.js
