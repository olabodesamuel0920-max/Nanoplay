<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="orbGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#7EC8E3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4A9FC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5a7a;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7EC8E3;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7EC8E3;stop-opacity:0" />
    </radialGradient>
    <filter id="orbBlur">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Glow -->
  <circle cx="50" cy="50" r="45" fill="url(#orbGlow)" filter="url(#orbBlur)" opacity="0.6" />

  <!-- Main orb -->
  <circle cx="50" cy="50" r="30" fill="url(#orbGrad)" />

  <!-- Pentagon pattern -->
  <polygon points="50,32 62,42 58,56 42,56 38,42" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7" />
  <polygon points="50,36 58,44 55,54 45,54 42,44" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" />

  <!-- Shine -->
  <ellipse cx="40" cy="38" rx="8" ry="12" fill="white" opacity="0.3" transform="rotate(-30 40 38)" />

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#7EC8E3" stroke-width="2" opacity="0.5" />
  <circle cx="50" cy="50" r="42" fill="none" stroke="#7EC8E3" stroke-width="1" opacity="0.3" />
</svg>