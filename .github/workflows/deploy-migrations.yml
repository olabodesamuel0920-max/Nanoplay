# .github/workflows/deploy-migrations.yml
name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20.x'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: '2.108.0'

      - name: Install Project Dependencies
        run: |
          npm ci || npm install

      - name: Run Security Regression Tests
        run: |
          npm run test:security

      - name: Verify Environment Isolation
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          WALLET_FUNDING_ENABLED: ${{ secrets.WALLET_FUNDING_ENABLED }}
        run: |
          node tmp/print_masked_env.js > env_verif_output.txt 2>&1
          cat env_verif_output.txt

      - name: Link Supabase Project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"
          supabase migration list > migration_list_before.txt 2>&1

      - name: Dry-Run Migrations
        run: |
          supabase db push --dry-run > dry_run_output.txt 2>&1
          cat dry_run_output.txt

      - name: Push Migrations to Production
        run: |
          supabase db push > push_output.txt 2>&1
          cat push_output.txt
          supabase migration list > migration_list_after.txt 2>&1

      - name: Install Verification Dependencies
        run: |
          npm install @supabase/supabase-js

      - name: Run Schema Verification
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tmp/inspect_all.js

      - name: Run Production Functional QA
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tmp/qa_functional_test.js > qa_test_output.txt 2>&1
          cat qa_test_output.txt

      - name: Commit and Push Staging Evidence
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b test-results || git checkout test-results
          git add env_verif_output.txt migration_list_before.txt dry_run_output.txt push_output.txt migration_list_after.txt qa_test_output.txt || true
          git commit -m "test: record staging migration and QA evidence" || true
          git push -f origin test-results || true



